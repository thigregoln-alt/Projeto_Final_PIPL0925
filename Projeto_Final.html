function el(tag, attrs = {}, ...children) {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'className') node.className = v;
    else if (k === 'innerHTML') node.innerHTML = v;
    else if (k.startsWith('on')) node.addEventListener(k.slice(2).toLowerCase(), v);
    else node.setAttribute(k, v);
  }
  for (const child of children) {
    if (child == null) continue;
    node.append(typeof child === 'string' ? document.createTextNode(child) : child);
  }
  return node;
}

function html(tag, attrs, htmlStr) {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (k === 'className') node.className = v;
    else node.setAttribute(k, v);
  }
  node.innerHTML = htmlStr;
  return node;
}

function sectionHeader(tag, title, line) {
  const hdr = el('div', { className: 'section-header fade-in' });
  hdr.append(
    el('span', { className: 'section-tag' }, tag),
    html('h2', { className: 'section-title' }, title),
    el('div', { className: 'section-line' })
  );
  return hdr;
}

function subHeading(text) {
  const h = document.createElement('h3');
  h.style.cssText = 'font-family:var(--font-title);color:var(--green);letter-spacing:2px;margin-bottom:2rem;font-size:1.2rem;';
  h.textContent = text;
  return h;
}

function subHeadingMargin(text, marginTop = '3rem', marginBottom = '1.5rem') {
  const h = subHeading(text);
  h.style.margin = `${marginTop} 0 ${marginBottom}`;
  return h;
}

function card(icon, title, text, extraStyle) {
  const c = el('div', { className: 'card' });
  if (extraStyle) c.setAttribute('style', extraStyle);
  c.append(
    el('span', { className: 'card-icon' }, icon),
    html('h3', {}, title),
    html('p', {}, text)
  );
  return c;
}

function tableWrap(headers, rows, extraClass) {
  const wrap = el('div', { className: 'table-wrap fade-in' });
  const tbl = el('table');
  if (extraClass) tbl.classList.add(extraClass);
  const thead = el('thead');
  const tr = el('tr');
  headers.forEach(h => tr.append(el('th', {}, h)));
  thead.append(tr);
  tbl.append(thead);
  const tbody = el('tbody');
  rows.forEach(row => {
    const tr2 = el('tr');
    row.forEach(cell => {
      const td = el('td');
      td.innerHTML = cell;
      tr2.append(td);
    });
    tbody.append(tr2);
  });
  tbl.append(tbody);
  wrap.append(tbl);
  return wrap;
}

function stepEl(num, title, text, tip, img, imgTxt) {
  const s = el('div', { className: 'step' });
  const sNum = el('div', { className: 'step-num' }, num);
  const sContent = el('div', { className: 'step-content' });
  const h4 = html('h4', {}, title);
  const p = html('p', {}, text);
  sContent.append(h4, p);
  if (img) {
    const ph = el('div', { className: 'img-placeholder' });
    ph.append(el('span', {}, img), document.createTextNode(imgTxt));
    sContent.append(ph);
  }
  if (tip) {
    const t = el('div', { className: 'step-tip' }, tip);
    sContent.append(t);
  }
  s.append(sNum, sContent);
  return s;
}

// ─── BEHAVIOURS ──────────────────────────────────────────────────────────────

function spawnParticles() {
  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0;';
  document.body.appendChild(container);
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.setProperty('--dx', (Math.random() - 0.5) * 200 + 'px');
    p.style.animationDuration = (8 + Math.random() * 15) + 's';
    p.style.animationDelay = (-Math.random() * 20) + 's';
    container.appendChild(p);
  }
}

function initScrollBehaviors() {
  window.addEventListener('scroll', () => {
    const h = document.documentElement;
    const pct = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100;
    document.getElementById('progress-bar').style.width = pct + '%';
    const btn = document.getElementById('back-top');
    if (h.scrollTop > 400) btn.classList.add('show');
    else btn.classList.remove('show');
  });
}

function animateCounters() {
  document.querySelectorAll('[data-count]').forEach(el => {
    const target = +el.dataset.count;
    let current = 0;
    const step = target / 40;
    const timer = setInterval(() => {
      current += step;
      if (current >= target) { current = target; clearInterval(timer); }
      el.textContent = Math.floor(current) + (el.dataset.suffix || '');
    }, 40);
  });
}

function initFadeIn() {
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.1 });
  document.querySelectorAll('.fade-in').forEach(el => obs.observe(el));
}

function toggleMenu() {
  document.getElementById('mobile-menu').classList.toggle('open');
}

function toggleTrouble(header) {
  const body = header.nextElementSibling;
  const arrow = header.querySelector('.trouble-arrow');
  body.classList.toggle('open');
  arrow.style.transform = body.classList.contains('open') ? 'rotate(180deg)' : '';
}

function searchContent(q) {
  const results = document.getElementById('search-results');
  if (!q.trim()) { results.innerHTML = ''; return; }
  const matches = SEARCH_INDEX.filter(s => s.text.toLowerCase().includes(q.toLowerCase()));
  if (!matches.length) {
    results.innerHTML = '<p style="color:var(--text-dim);font-family:var(--font-mono);">Nenhum resultado encontrado.</p>';
    return;
  }
  results.innerHTML = matches.map(m => `
    <a href="${m.section}" style="display:inline-block;margin:4px;padding:8px 16px;
    background:rgba(0,255,136,0.08);border:1px solid var(--border);border-radius:4px;
    color:var(--green);text-decoration:none;font-family:var(--font-mono);font-size:0.85rem;">
    ▸ ${m.label}</a>`).join('');
}
